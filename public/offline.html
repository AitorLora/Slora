<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sin conexión · Slora Nautic</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0A2540;
      color: #C5DCF0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 2rem 1.5rem;
      text-align: center;
      gap: 1.5rem;
    }

    .icon {
      width: 64px;
      height: 64px;
      opacity: 0.35;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 0.875rem;
      color: #7BAFD4;
      max-width: 280px;
      line-height: 1.6;
    }

    button {
      margin-top: 0.5rem;
      padding: 0.65rem 1.5rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #C5DCF0;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: rgba(255,255,255,0.13); }

    .brand {
      position: absolute;
      top: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9375rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .brand span { color: #7BAFD4; font-weight: 400; }
  </style>
</head>
<body>
  <div class="brand">Slora <span>Nautic</span></div>

  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1" y1="1" x2="23" y2="23"/>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
    <line x1="12" y1="20" x2="12.01" y2="20"/>
  </svg>

  <h1>Sin conexión</h1>
  <p>No hay conexión a internet. Cuando vuelvas a estar en línea podrás acceder a Slora Nautic.</p>

  <button onclick="window.location.reload()">Reintentar</button>
</body>
</html>
